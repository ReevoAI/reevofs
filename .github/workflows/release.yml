name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            suffix: linux-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            suffix: linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install FUSE dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev pkg-config

      - name: Build release binaries
        run: cargo build --release --features fuse

      - name: Rename artifacts
        run: |
          cp target/release/reevofs reevofs-${{ matrix.suffix }}
          cp target/release/libreevofs_preload.so libreevofs_preload-${{ matrix.suffix }}.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            reevofs-${{ matrix.suffix }}
            libreevofs_preload-${{ matrix.suffix }}.so

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            binaries-linux-arm64/reevofs-linux-arm64
            binaries-linux-arm64/libreevofs_preload-linux-arm64.so
            binaries-linux-amd64/reevofs-linux-amd64
            binaries-linux-amd64/libreevofs_preload-linux-amd64.so
